<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBTIS 204 | Tlalpujahua</title>
    <style>
        :root { --guinda: #800020; --gris: #f4f4f4; --blanco: #ffffff; }
        body { font-family: sans-serif; margin: 0; }
        
        /* Encabezado */
        header { padding: 20px 5%; background: var(--blanco); border-bottom: 3px solid var(--guinda); display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 50px; }
        nav a { margin-left: 15px; text-decoration: none; color: var(--guinda); font-weight: bold; }

        /* Hero */
        .hero { height: 60vh; background: var(--guinda); color: var(--blanco); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }

        /* Secciones */
        .contenedor { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .tarjeta { background: var(--gris); padding: 15px; border-radius: 10px; }
        
        /* Ajuste móvil */
        @media (max-width: 600px) { header { flex-direction: column; } nav { margin-top: 10px; } }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; color: var(--guinda);">LOGO CBTIS 204</div>
        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#info">Admisión</a>
            <a href="#carreras">Carreras</a>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <h1>CBTIS 204</h1>
        <p>Tlalpujahua, Michoacán</p>
    </section>

    <section id="info" class="contenedor">
        <h2>Admisión 2026</h2>
        <p>Consulta los requisitos para formar parte de nuestra comunidad educativa.</p>
    </section>

    <section id="carreras" class="contenedor" style="background: #eee;">
        <h2>Nuestras Especialidades</h2>
        <div class="grid">
            <div class="tarjeta"><h3>Recursos Humanos</h3></div>
            <div class="tarjeta"><h3>Contabilidad</h3></div>
            <div class="tarjeta"><h3>Construcción</h3></div>
            <div class="tarjeta"><h3>Ofimática</h3></div>
            <div class="tarjeta"><h3>Vida Saludable</h3></div>
            <div class="tarjeta"><h3>Turismo</h3></div>
            <div class="tarjeta"><h3>E-commerce</h3></div>
        </div>
    </section>

</body>
</html>
